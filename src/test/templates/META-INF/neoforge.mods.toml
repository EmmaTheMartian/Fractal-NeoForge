modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/emmathemartian/fractal-neoforge/issues"

[[mods]]
    modId = "${mod_id}_test"
    version = "${mod_version}"
    displayName = "${mod_name} Test Mod"
    displayURL = "https://github.com/emmathemartian/fractal-neoforge"
    logoFile = "assets/${mod_id}/icon.png"
    credits = "Unascribed, DaFuqs"
    authors = "${mod_authors}"
    description = '''Test mod for Fractal'''

[[dependencies."${mod_id}_test"]]
    modId = "neoforge"
    type = "required"
    versionRange = "${neo_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies."${mod_id}_test"]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"
